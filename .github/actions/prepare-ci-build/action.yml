name: Prepare CI Build
description: Prepare the repository, toolchains, generated bindings, and Release build for CI jobs
inputs:
  dotnet-version:
    description: .NET SDK version to install
    required: false
    default: 10.0.x
  rust-toolchain:
    description: Rust toolchain version to install
    required: false
    default: 1.85.0
  payjoin-ffi-features:
    description: Extra payjoin-ffi features used while generating C# bindings
    required: false
    default: _test-utils
  payjoin-ffi-profile:
    description: Cargo profile used while generating C# bindings and native binaries
    required: false
    default: dev
runs:
  using: composite
  steps:
    - name: Set up .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.rust-toolchain }}

    - name: Restore Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: rust-payjoin -> rust-payjoin/target

    - name: Set up Cargo lockfile for rust-payjoin
      shell: bash
      run: cp rust-payjoin/Cargo-recent.lock rust-payjoin/Cargo.lock

    - name: Generate C# bindings and native binaries
      shell: bash
      env:
        PAYJOIN_FFI_FEATURES: ${{ inputs.payjoin-ffi-features }}
        PAYJOIN_FFI_PROFILE: ${{ inputs.payjoin-ffi-profile }}
      run: bash ./.github/scripts/generate-csharp-bindings.sh

    - name: Restore .NET dependencies
      shell: bash
      run: dotnet restore "BTCPayServer.Plugins.Payjoin.sln"

    - name: Build solution
      shell: bash
      run: dotnet build "BTCPayServer.Plugins.Payjoin.sln" -c Release --no-restore
