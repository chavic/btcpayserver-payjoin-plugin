name: package-btcpay-plugin

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  RUSTUP_TOOLCHAIN: 1.85.0

jobs:
  pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Payjoin CI
        uses: ./.github/actions/prepare-ci-build
        with:
          dotnet-version: 10.0.x
          rust-toolchain: ${{ env.RUSTUP_TOOLCHAIN }}
          payjoin-ffi-features: ""
          payjoin-ffi-profile: release

      - name: Publish plugin
        run: dotnet publish "./BTCPayServer.Plugins.Payjoin/BTCPayServer.Plugins.Payjoin.csproj" -c Release --no-restore -o "./artifacts/publish/BTCPayServer.Plugins.Payjoin"

      - name: Build packer
        run: dotnet build "./btcpayserver/BTCPayServer.PluginPacker/BTCPayServer.PluginPacker.csproj" -c Release

      - name: Pack .btcpay
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project "./btcpayserver/BTCPayServer.PluginPacker/BTCPayServer.PluginPacker.csproj" -c Release --no-build -- \
            "./artifacts/publish/BTCPayServer.Plugins.Payjoin" \
            "BTCPayServer.Plugins.Payjoin" \
            "./artifacts/packages"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: btcpay-plugin
          path: artifacts/packages/**/*.btcpay
